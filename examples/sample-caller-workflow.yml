# Sample caller workflow — copy this into your app repo to use the Mobile CI Engine.
#
# 1. Save as .github/workflows/build-mobile.yml (or similar) in your repo.
# 2. Uses sanskari27/rn-builder-ci; if you use your own fork, replace with YOUR_USERNAME/rn-builder-ci.
# 3. Use a tag (e.g. @v1 or @v1.0.0); never use @main.
# 4. Add the required secrets for production builds (see docs/secrets.md).
#
# Engine uses only 3 inputs (initial React Native setup): platform, build_type, environment.
# Android module, iOS scheme/workspace/export, artifact retention, etc. are auto or fixed.

name: Build Mobile

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'both'
        type: choice
        options:
          - android
          - ios
          - both
      build_type:
        description: 'Build type (empty = auto: apk or aab from environment)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - apk
          - aab
          - release
      environment:
        description: 'Environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

jobs:
  build:
    id: build
    uses: sanskari27/rn-builder-ci/.github/workflows/mobile-build.yml@v1
    with:
      platform: ${{ inputs.platform }}
      build_type: ${{ inputs.build_type }}
      environment: ${{ inputs.environment }}
    secrets: inherit

